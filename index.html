<!DOCTYPE html>
<html>
<head>
    <title>My AWS Portfolio</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            text-align:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
        }

        .container{
            padding:80px 20px;
        }

        h1{
            font-size:60px;
        }

        p{
            font-size:24px;
        }

        .card{
            background:white;
            color:black;
            width:300px;
            margin:auto;
            padding:20px;
            border-radius:20px;
            margin-top:40px;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:black;
            color:white;
            text-decoration:none;
            border-radius:10px;
        }

        .btn:hover{
            background:#333;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Hello from AWS 🚀</h1>

        <p>This website is hosted on AWS EC2 using Nginx</p>

        <div class="card">
            <h2>About Me</h2>

            <p>
                I am learning Cloud Computing,
                AWS and DevOps.
            </p>

            <a class="btn" href="#">
                Contact Me
            </a>
        </div>

    </div>

</body>
</html>
